name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-tests:
    name: Core tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test runner
        run: python -m pip install --upgrade pip pytest -e .
      - name: Run core tests
        run: python -m pytest -q

  integration-tests:
    name: Optional integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip -e ".[dev]"
      - name: Run tests with optional integrations installed
        run: python -m pytest -q

  package:
    name: Build and validate distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Check package metadata
        run: python -m twine check --strict dist/*
      - name: Verify wheel installation
        run: |
          python -m venv /tmp/terag-wheel-check
          /tmp/terag-wheel-check/bin/python -m pip install dist/*.whl
          /tmp/terag-wheel-check/bin/python -c "from terag import TERAG, TERAGConfig"
